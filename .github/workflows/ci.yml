name: luamino CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - run: npm ci
    - run: npm run build --if-present
    - run: |
        total=0
        passed=0
        for input in test/*.test.lua; do
          total=$((total + 1))
          name=${input%.test.lua}
          if node dist/luamino.js "$input" | diff - "$name.expected.lua" > /dev/null; then
            passed=$((passed + 1))
          else
            echo "❌ $name"
            exit 1
          fi
        done
        echo "✅ $passed/$total tests passed"
